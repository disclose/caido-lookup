name: Release

# Caido store release. Triggered manually (workflow_dispatch), mirroring
# caido/starterkit-plugin's sanctioned release workflow:
#   - the release tag is the BARE version from manifest.json (no "v" prefix),
#     so the manifest version and the release tag always match exactly;
#   - the release assets are exactly plugin_package.zip and
#     plugin_package.zip.sig (Caido store naming requirement);
#   - the package is signed with the Ed25519 PRIVATE_KEY Actions secret
#     (matching the public_key registered in caido/store plugin_packages.json).
# The repo's "Immutable releases" setting must be enabled so the published
# release is immutable. Ubuntu runners ship OpenSSL 3 (Ed25519-capable).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check version
        id: meta
        run: |
          VERSION=$(jq -r .version manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build plugin package
        run: npm run build
      - name: Sign package
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          if [[ -z "${PRIVATE_KEY}" ]]; then
            echo "::error::PRIVATE_KEY secret is missing — cannot sign the release. Set it under Settings → Secrets → Actions."
            exit 1
          fi
          printf '%s' "${PRIVATE_KEY}" > private_key.pem
          openssl pkeyutl -sign -inkey private_key.pem -out plugin_package.zip.sig -rawin -in plugin_package.zip
          rm -f private_key.pem
      # With "Immutable releases" enabled, assets cannot be added after a
      # release is published — so create as a DRAFT with assets attached,
      # then flip to published, which is when immutability locks in.
      - name: Create immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          gh release create "${VERSION}" plugin_package.zip plugin_package.zip.sig \
            --target "${GITHUB_SHA}" --title "${VERSION}" --notes "Release ${VERSION}" --draft
          gh release edit "${VERSION}" --draft=false
